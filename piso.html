<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piso — Nueva Era</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #faf9f7; color: #1b1b1f; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
    header { 
      background: white; border-bottom: 1px solid #eae7e2; padding: 1rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .back { color: #8a8078; text-decoration: none; font-size: .85rem; }
    .back:hover { color: #1b1b1f; }
    .detalle { padding: 3rem 0; }
    .detalle .img-hero {
      width: 100%; height: 350px; background: #eae7e2; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; margin-bottom: 2rem; overflow: hidden;
    }
    .detalle h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: .5rem; }
    .detalle .ubicacion { color: #8a8078; font-size: .95rem; margin-bottom: .5rem; }
    .detalle .precio { font-size: 2rem; font-weight: 800; color: #d4af37; margin-bottom: 2rem; }
    .carac-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .carac-item { background: white; border: 1px solid #eae7e2; border-radius: 12px; padding: 1rem; text-align: center; }
    .carac-item .val { font-size: 1.1rem; font-weight: 700; color: #1b1b1f; }
    .carac-item .lbl { font-size: .78rem; color: #8a8078; margin-top: .2rem; }
    .descripcion { background: white; border-radius: 16px; padding: 2rem; border: 1px solid #eae7e2; margin-bottom: 2rem; line-height: 1.7; color: #4a4642; font-size: .92rem; }
    .contacto-card { background: #1b1b1f; border-radius: 16px; padding: 2rem; color: #faf9f7; }
    .contacto-card h3 { color: #d4af37; font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 1rem; }
    .contacto-card p { font-size: .9rem; margin-bottom: .3rem; color: #b0a89e; }
    .contacto-card strong { color: #faf9f7; }
    .contacto-card .btn-contactar { background: #d4af37; color: #1b1b1f; border: none; padding: .85rem 2rem; border-radius: 50px; font-weight: 600; font-size: .9rem; cursor: pointer; font-family: inherit; width: 100%; margin-top: 1rem; transition: background .2s; }
    .contacto-card .btn-contactar:hover { background: #c4a030; }
    .loading { text-align: center; padding: 4rem; color: #8a8078; }
    .error { text-align: center; padding: 4rem; color: #c0392b; }
    @media (max-width: 768px) {
      .detalle .img-hero { height: 220px; }
      .detalle h1 { font-size: 1.5rem; }
      .detalle .precio { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<header>
  <a href="/" class="back">← Volver al portal</a>
</header>
<div class="container">
  <div class="detalle" id="detalle">
    <div class="loading"><div class="spinner" style="width:40px;height:40px;border:4px solid #eae7e2;border-top-color:#d4af37;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 1rem"></div><p>Cargando piso...</p></div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>
const API = 'https://wypgqpgjlookbhuaiyxa.supabase.co/functions/v1/nueva-era';
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (!id) {
  document.getElementById('detalle').innerHTML = '<div class="error"><h2>Enlace inválido</h2></div>';
} else {
  cargarDetalle();
}

async function cargarDetalle() {
  try {
    const res = await fetch(API + '?action=detalle&id=' + id);
    const data = await res.json();
    if (!data.piso) {
      document.getElementById('detalle').innerHTML = '<div class="error"><h2>Piso no encontrado</h2></div>';
      return;
    }
    renderDetalle(data.piso);
  } catch(e) {
    document.getElementById('detalle').innerHTML = '<div class="error"><h2>Error al cargar</h2></div>';
  }
}

function renderDetalle(p) {
  const emoji = p.tipo === 'piso' ? '🏢' : p.tipo === 'casa' ? '🏠' : p.tipo === 'ático' ? '🏛️' : '🏡';
  document.title = p.titulo + ' — Nueva Era';
  document.getElementById('detalle').innerHTML = `
    <div class="img-hero"><span style="opacity:.3;font-size:6rem">${emoji}</span></div>
    <h1>${p.titulo}</h1>
    <div class="ubicacion">📍 ${p.ciudad ? p.ciudad + ', ' : ''}${p.provincia || ''}</div>
    <div class="precio">${p.precio?.toLocaleString('es-ES')} €</div>
    <div class="carac-grid">
      ${p.m2 ? '<div class="carac-item"><div class="val">' + p.m2 + ' m²</div><div class="lbl">Superficie</div></div>' : ''}
      ${p.habitaciones ? '<div class="carac-item"><div class="val">' + p.habitaciones + '</div><div class="lbl">Habitaciones</div></div>' : ''}
      ${p.banos ? '<div class="carac-item"><div class="val">' + p.banos + '</div><div class="lbl">Baños</div></div>' : ''}
      ${p.planta ? '<div class="carac-item"><div class="val">' + p.planta + '</div><div class="lbl">Planta</div></div>' : ''}
      ${p.ascensor ? '<div class="carac-item"><div class="val">✅</div><div class="lbl">Ascensor</div></div>' : ''}
      ${p.garaje ? '<div class="carac-item"><div class="val">✅</div><div class="lbl">Garaje</div></div>' : ''}
      ${p.terraza ? '<div class="carac-item"><div class="val">✅</div><div class="lbl">Terraza</div></div>' : ''}
      ${p.certificado_energetico ? '<div class="carac-item"><div class="val">' + p.certificado_energetico + '</div><div class="lbl">Certificado</div></div>' : ''}
    </div>
    ${p.descripcion ? '<div class="descripcion">' + p.descripcion.replace(/\n/g, '<br>') + '</div>' : ''}
    <div class="contacto-card">
      <h3>📞 Contacto</h3>
      <p><strong>Contacto:</strong> ${p.nombre_contacto || '—'}</p>
      <p><strong>Email:</strong> <a href="mailto:${p.email_contacto}" style="color:#d4af37">${p.email_contacto}</a></p>
      ${p.telefono_contacto ? '<p><strong>Teléfono:</strong> ' + p.telefono_contacto + '</p>' : ''}
      <button class="btn-contactar" onclick="window.location.href='mailto:'+encodeURIComponent('${p.email_contacto}')+'?subject=Interesado en '+encodeURIComponent('${p.titulo}')+'&body=Hola, vi tu anuncio en Nueva Era y estoy interesado.'">Enviar mensaje ✉️</button>
    </div>
  `;
}
</script>
</body>
</html>
